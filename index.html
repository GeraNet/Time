<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Trainer</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
    padding: 50px;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  input {
    padding: 10px;
    width: 80%;
    margin-top: 10px;
  }

  button {
    padding: 10px 15px;
    margin-top: 10px;
    cursor: pointer;
  }

  #result {
    margin-top: 15px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="card">
  <h2>⏰ Time Trainer</h2>

  <p id="question">Loading...</p>

  <input id="answer" placeholder="Write time in English">

  <br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="newQuestion()">New</button>

  <p id="result"></p>
</div>

<script>
let currentTime = {};

function randomTime() {
  let hour = Math.floor(Math.random() * 12) + 1;
  let minute = Math.floor(Math.random() * 60);

  return {hour, minute};
}

function toWords(h, m) {
  if (m === 0) return `It’s ${h} o’clock`;
  if (m === 15) return `It’s a quarter past ${h}`;
  if (m === 30) return `It’s half past ${h}`;
  if (m === 45) return `It’s a quarter to ${h + 1}`;

  if (m < 30) return `It’s ${m} past ${h}`;
  else return `It’s ${60 - m} to ${h + 1}`;
}

function newQuestion() {
  currentTime = randomTime();

  document.getElementById("question").innerText =
    `What is ${currentTime.hour}:${String(currentTime.minute).padStart(2,'0')} in English?`;

  document.getElementById("result").innerText = "";
  document.getElementById("answer").value = "";
}

function checkAnswer() {
  let user = document.getElementById("answer").value.toLowerCase().trim();
  let correct = toWords(currentTime.hour, currentTime.minute).toLowerCase();

  if (user === correct) {
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Wrong: " + correct;
  }
}

newQuestion();
</script>

</body>
</html>
